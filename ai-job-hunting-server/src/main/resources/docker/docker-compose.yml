version: "3"

services:
  ai-job:
    container_name: "ai-job"
    image: "ai-job:1.0"
    networks:
      - data_smart_course
    ports:
      - "9100:9100"
      - "6768:6768"
    volumes:
      - /app/ai-job/:/app/logs
    # 会覆盖dockerfile中的cmd命令
    command: '/app/ai-job.jar --smart.config.webui.port=6768 --smart.config.desc.infer=true'
    privileged: true

    # 如果使用docker部署，并使用默认properties文件，请指定mysql.host环境变量
    environment:
      - TZ=Asia/Shanghai


# 我这里已经存在这个网络了
networks:
  data_smart_course:
    external: true



