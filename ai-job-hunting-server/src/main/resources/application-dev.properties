server.port=9100
spring.application.name=ai-job

# ai
# 仅重试一次
spring.ai.retry.max-attempts=1

# 上传文件限制
spring.servlet.multipart.max-file-size = 20MB
spring.servlet.multipart.max-request-size = 20MB

# kimi ai
spring.ai.kimi.api-key=sk-freBLO0MfGl48LLcXD75OtnIFtw8l4ITQmNNNqrn2qXMcYMx
spring.ai.kimi.base-url=https://api.moonshot.cn/
spring.ai.kimi.chat.options.model=moonshot-v1-8k


# openai 【不需要设置真实值，但是还有这个key】
spring.ai.openai.api-key=xxx

# pay
# 支付宝支付参数配置
alipay.app_id=xxxx
alipay.merchant_private_key=xxxx
alipay.alipay_public_key=xxxx
alipay.notify_url=http://xxxx.com/api/pay/paySuccessCallBack
alipay.charset=utf-8
alipay.gatewayUrl=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.logo.base64=data:image/png;base64,

# smart-config
smart.username=admin
smart.password=123456

# mysql
spring.datasource.username=xxxx
spring.datasource.password=xxxx
spring.datasource.driverClassName=com.mysql.jdbc.Driver
#mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
spring.datasource.url=jdbc:mysql://localhost:3306/ai_job?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC&useSSL=false

# log配置
logging.pattern.console=%clr(%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd HH:mm:ss.SSS}}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(${PID:}){magenta} %clr(---){faint} %clr([%15.15t]){faint} [%X{requestId}] %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}
logging.pattern.file=%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd HH:mm:ss.SSS}} ${LOG_LEVEL_PATTERN:%5p} ${PID: } --- [%t] [%X{requestId}] %-40.40logger{39} : %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}


login-Filter.freeLoginArray=["/api/user/import/resume","/api/user/silently/login","/api/pay/paySuccessCallBack","/api/job/seeker/cloned/change/session/admin/status","/api/pay/getQr","/test/**"]

# ai配置
openai.pool.config.list =[{"base-url":"https://dashscope.aliyuncs.com/compatible-mode/v1","api-key":"sk-xxxx","name":"qwen3-max-2026-01-23","completions-path":"/chat/completions","chat.options.model":"qwen3-max-2026-01-23","extraBody":{"enable_thinking":false}},{"base-url":"https://dashscope.aliyuncs.com/compatible-mode/v1","api-key":"sk-xxxx","name":"qwen3.5-plus-2026-02-15","completions-path":"/chat/completions","chat.options.model":"qwen3.5-plus-2026-02-15"}]


spring.main.allow-circular-references=true